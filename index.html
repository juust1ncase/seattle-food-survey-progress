<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seattle Industry Survey — Carousel v4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Instrument+Sans:ital,wght@0,400;0,600;1,400&display=swap');

  :root {
    --bg: #0e0e0e;
    --surface: #141414;
    --border: #2a2a2a;
    --text: #f0ece4;
    --muted: #7a7570;
    --dim: #3a3632;
    --fav:   #c8a96e;
    --gem:   #7eb8a4;
    --cross: #c47d8e;
    --scale: 0.36;
    --slide-w: 1080px;
    --slide-h: 1350px;
    --display-w: calc(1080px * var(--scale));
    --display-h: calc(1350px * var(--scale));
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #080808;
    font-family: 'Instrument Sans', sans-serif;
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 24px;
  }

  .nav {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 8px;
  }
  .nav button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .nav button.active, .nav button:hover {
    background: var(--dim);
    color: var(--text);
    border-color: var(--muted);
  }

  .slide-outer {
    width: var(--display-w);
    height: var(--display-h);
    display: none;
    overflow: hidden;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }
  .slide-outer.active { display: block; }

  .slide-wrap {
    width: var(--slide-w);
    height: var(--slide-h);
    position: relative;
    overflow: hidden;
    background: var(--bg);
    transform-origin: top left;
    transform: scale(var(--scale));
    display: block;
  }

  .mono { font-family: 'DM Mono', monospace; }
  .serif { font-family: 'DM Serif Display', serif; }
  .sig { font-family: 'DM Mono', monospace; font-size: 19px; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase; }
  .rule { width: 100%; height: 1px; background: var(--border); }

  .rrow {
    display: grid;
    grid-template-columns: 38px 1fr auto;
    align-items: center;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    gap: 12px;
  }
  .rrow:first-child { border-top: 1px solid var(--border); }
  .rrow-rank { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--dim); }
  .rrow-name { font-size: 23px; color: var(--text); }
  .rrow-score { font-family: 'DM Serif Display', serif; font-size: 28px; }
  .rrow-pills { display: flex; gap: 8px; align-items: center; }
  .pill {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 3px 9px;
    border: 1px solid;
    letter-spacing: 0.03em;
  }

  .cat-label {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 12px;
  }
  .cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .mentions-wrap {
    padding: 22px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .mentions-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .mentions-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }
  .mention-tag {
    font-size: 18px;
    color: var(--text);
    padding: 4px 12px;
    border: 1px solid var(--border);
    background: var(--bg);
  }
</style>
</head>
<body>

<div class="nav" id="nav"></div>

<!-- Your full HTML content goes here. This file is ready for GitHub Pages. -->
<p style="max-width:680px;line-height:1.5;color:#f0ece4;text-align:center;">
  Paste your full slide HTML into this file, replacing this paragraph. I kept the structure ready for GitHub Pages.
</p>

<script>
  const slides = document.querySelectorAll('.slide-wrap');
  const nav = document.getElementById('nav');

  slides.forEach((s, i) => {
    const outer = document.createElement('div');
    outer.className = 'slide-outer';
    s.parentNode.insertBefore(outer, s);
    outer.appendChild(s);
    if (i === 0) outer.classList.add('active');
  });

  const outers = document.querySelectorAll('.slide-outer');
  outers.forEach((outer, i) => {
    const btn = document.createElement('button');
    btn.textContent = `0${i + 1}`;
    btn.onclick = () => {
      outers.forEach(x => x.classList.remove('active'));
      nav.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      outer.classList.add('active');
      btn.classList.add('active');
    };
    if (i === 0) btn.classList.add('active');
    nav.appendChild(btn);
  });
</script>
</body>
</html>
